name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: leakhunter
          POSTGRES_PASSWORD: leakhunter
          POSTGRES_DB: leakhunter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U leakhunter"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://leakhunter:leakhunter@localhost:5432/leakhunter?schema=public
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm --workspace server run db:generate

      - name: Apply migrations
        run: npm --workspace server run db:migrate

      - name: Typecheck backend
        run: npm --workspace server run typecheck

      - name: Run backend tests
        run: npm --workspace server run test

      - name: Build backend
        run: npm --workspace server run build

      - name: Build frontend
        run: npm --workspace web run build
